<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1a1a2e" stroke="url(#grad)" stroke-width="4"/>
  <!-- Smooth transition wave -->
  <path d="M 28 80
           C 28 80, 32 50, 42 50
           C 52 50, 54 70, 64 70
           C 74 70, 76 40, 86 40
           C 96 40, 100 64, 100 64"
        fill="none" stroke="url(#grad)" stroke-width="5" stroke-linecap="round"/>
  <!-- Crossfade arrow overlay -->
  <path d="M 88 42 L 100 64 L 92 68"
        fill="none" stroke="#00d4aa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 40 86 L 28 64 L 36 60"
        fill="none" stroke="#0088cc" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dots for emphasis -->
  <circle cx="64" cy="18" r="3" fill="#00d4aa" opacity="0.6"/>
  <circle cx="110" cy="64" r="3" fill="#0088cc" opacity="0.6"/>
  <circle cx="64" cy="110" r="3" fill="#00d4aa" opacity="0.6"/>
</svg>
